name: Xero Sync Queue Worker

on:
  push:
    branches:
      - main
  schedule:
    # Keep Xero work moving without relying on an admin opening the CRM.
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: xero-sync-queue-worker
  cancel-in-progress: false

jobs:
  process:
    name: Process Xero sync queue
    runs-on: ubuntu-latest
    steps:
      - name: Process pending Xero sync items
        env:
          ENABLE_XERO_SYNC_WORKER: ${{ vars.ENABLE_XERO_SYNC_WORKER }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ] && [ "${ENABLE_XERO_SYNC_WORKER:-false}" != "true" ]; then
            echo "Xero sync worker is disabled. Set repository variable ENABLE_XERO_SYNC_WORKER=true to enable scheduled processing."
            exit 0
          fi

          if [ -z "${SUPABASE_URL:-}" ]; then
            echo "::error::Missing SUPABASE_URL GitHub secret."
            exit 1
          fi

          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "::error::Missing SUPABASE_SERVICE_ROLE_KEY GitHub secret."
            exit 1
          fi

          # A small batch clears normal bursts without approaching Xero's limits.
          # The pause also gives the shared circuit breaker time to react to 429s.
          for attempt in 1 2 3; do
            response_file="$(mktemp)"
            http_code="$(
              curl --silent --show-error \
                --request POST \
                --header "Content-Type: application/json" \
                --header "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
                --data '{"action":"process-next"}' \
                --output "$response_file" \
                --write-out "%{http_code}" \
                "${SUPABASE_URL%/}/functions/v1/xero-sync"
            )"

            echo "Xero sync processor ${attempt}/3: HTTP ${http_code}"
            cat "$response_file"
            echo

            if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
              exit 1
            fi

            if grep -q '"processed":false' "$response_file"; then
              break
            fi

            if [ "$attempt" -lt 3 ]; then
              sleep 3
            fi
          done
