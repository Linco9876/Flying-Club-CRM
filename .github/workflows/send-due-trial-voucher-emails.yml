name: Send due trial voucher emails

on:
  schedule:
    # GitHub schedules are UTC. This runs regularly so recipient delivery times
    # are picked up without relying on an admin opening the CRM.
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  send-due:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger due voucher email delivery
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          TRIAL_VOUCHER_CRON_SECRET: ${{ secrets.TRIAL_VOUCHER_CRON_SECRET }}
        run: |
          set -euo pipefail

          fail_or_warn() {
            message="$1"
            if [ "${GITHUB_EVENT_NAME:-}" = "schedule" ]; then
              echo "::warning::${message}"
              exit 0
            fi
            echo "${message}" >&2
            exit 1
          }

          if [ -z "${SUPABASE_URL:-}" ]; then
            fail_or_warn "Missing SUPABASE_URL GitHub secret."
          fi

          if [ -z "${TRIAL_VOUCHER_CRON_SECRET:-}" ]; then
            fail_or_warn "Missing TRIAL_VOUCHER_CRON_SECRET GitHub secret."
          fi

          response_file="$(mktemp)"
          status_code="$(
            curl --silent --show-error \
              --request POST \
              --header "Content-Type: application/json" \
              --header "x-cron-secret: ${TRIAL_VOUCHER_CRON_SECRET}" \
              --data '{"action":"send-due"}' \
              --output "$response_file" \
              --write-out "%{http_code}" \
              "${SUPABASE_URL%/}/functions/v1/send-trial-voucher-email"
          )"

          echo "send-due status: ${status_code}"
          cat "$response_file"
          echo

          if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
            fail_or_warn "Due trial voucher email delivery endpoint returned HTTP ${status_code}."
          fi

          python3 - "$response_file" "${GITHUB_EVENT_NAME:-}" <<'PY'
          import json
          import sys

          path = sys.argv[1]
          event_name = sys.argv[2] if len(sys.argv) > 2 else ""
          with open(path, "r", encoding="utf-8") as handle:
              payload = json.load(handle)

          failed = int(payload.get("failed") or 0)
          processed = int(payload.get("processed") or 0)
          sent = int(payload.get("sent") or 0)

          print(f"Due voucher email summary: processed={processed} sent={sent} failed={failed}")

          if failed > 0:
              message = "One or more due trial voucher emails failed to send."
              if event_name == "schedule":
                  print(f"::warning::{message}")
                  sys.exit(0)
              print(message, file=sys.stderr)
              sys.exit(1)
          PY
