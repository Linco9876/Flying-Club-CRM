name: Deploy Supabase migrations

on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/deploy-supabase-migrations.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        id: secrets
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_DB_URL:-}" ]; then
            echo "::notice title=Supabase migrations skipped::Missing SUPABASE_DB_URL GitHub secret. Add the pooled or direct Supabase Postgres connection string as a repository secret to enable automatic migration deploys."
            echo "has_db_url=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_db_url=true" >> "$GITHUB_OUTPUT"

      - name: Show pending migration plan
        if: steps.secrets.outputs.has_db_url == 'true'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail

          npx --yes supabase@latest db push \
            --db-url "${SUPABASE_DB_URL}" \
            --dry-run

      - name: Apply migrations
        if: steps.secrets.outputs.has_db_url == 'true'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail

          npx --yes supabase@latest db push \
            --db-url "${SUPABASE_DB_URL}" \
            --yes
