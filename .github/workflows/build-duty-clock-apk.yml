name: Build Duty Clock APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    name: Signed Android release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: apps/duty-clock
    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.DUTY_CLOCK_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.DUTY_CLOCK_SUPABASE_PUBLISHABLE_KEY }}
      ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/apps/duty-clock/android/app/bfc-duty-clock-release.p12
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: bfc-duty-clock
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/duty-clock/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Validate required build settings
        shell: bash
        run: |
          test -n "$EXPO_PUBLIC_SUPABASE_URL"
          test -n "$EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_PASSWORD"

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Restore release signing certificate
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/bfc-duty-clock-release.p12

      - name: Configure release signing
        run: node scripts/configure-android-signing.mjs

      - name: Build signed release APK
        shell: bash
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Prepare download artifact
        shell: bash
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/release/app-release.apk release/BFC-Duty-Clock-1.0.0.apk
          sha256sum release/BFC-Duty-Clock-1.0.0.apk > release/BFC-Duty-Clock-1.0.0.apk.sha256
          "$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)/apksigner" verify --verbose --print-certs release/BFC-Duty-Clock-1.0.0.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: BFC-Duty-Clock-Android
          path: apps/duty-clock/release/
          if-no-files-found: error
          retention-days: 30
