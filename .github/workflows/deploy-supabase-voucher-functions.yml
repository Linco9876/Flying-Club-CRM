name: Deploy Supabase voucher functions

on:
  push:
    branches:
      - main
    paths:
      - "supabase/config.toml"
      - "supabase/functions/_shared/**"
      - "supabase/functions/trial-voucher-public/**"
      - "supabase/functions/trial-voucher-admin/**"
      - "supabase/functions/create-trial-voucher-checkout/**"
      - "supabase/functions/create-flight-payment-checkout/**"
      - "supabase/functions/member-card-setup/**"
      - "supabase/functions/charge-flight-saved-card/**"
      - "supabase/functions/stripe-connect/**"
      - "supabase/functions/send-trial-voucher-email/**"
      - "supabase/functions/trial-voucher-stripe-webhook/**"
      - ".github/workflows/deploy-supabase-voucher-functions.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-voucher-functions
  cancel-in-progress: false

env:
  SUPABASE_PROJECT_REF: joarmzswpufrduectjse

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Supabase deploy token
        id: supabase-token
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::Missing SUPABASE_ACCESS_TOKEN GitHub secret. Voucher functions cannot be deployed."
            {
              echo "### Supabase deploy failed"
              echo ""
              echo "Missing \`SUPABASE_ACCESS_TOKEN\` GitHub repository secret."
              echo "Add the secret so code merged to main cannot silently remain undeployed."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Type-check voucher Edge Functions
        run: |
          set -euo pipefail

          npx --yes deno check --node-modules-dir=false supabase/functions/trial-voucher-public/index.ts
          npx --yes deno check --node-modules-dir=false supabase/functions/trial-voucher-admin/index.ts
          npx --yes deno check --node-modules-dir=false supabase/functions/create-trial-voucher-checkout/index.ts
          npx --yes deno check --node-modules-dir=false supabase/functions/create-flight-payment-checkout/index.ts
          npx --yes deno check --node-modules-dir=false supabase/functions/member-card-setup/index.ts
          npx --yes deno check --node-modules-dir=false supabase/functions/charge-flight-saved-card/index.ts
          npx --yes deno check --node-modules-dir=false supabase/functions/stripe-connect/index.ts
          npx --yes deno check --node-modules-dir=false supabase/functions/send-trial-voucher-email/index.ts
          npx --yes deno check --node-modules-dir=false supabase/functions/trial-voucher-stripe-webhook/index.ts

      - name: Test voucher readiness rules
        run: |
          set -euo pipefail

          npx --yes deno test --node-modules-dir=false supabase/functions/_shared/trialVoucherReadiness.test.ts
          npx --yes deno test --node-modules-dir=false supabase/functions/_shared/stripeMode.test.ts

      - name: Deploy voucher Edge Functions
        if: steps.supabase-token.outputs.available == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail

          npx --yes supabase@latest functions deploy \
            trial-voucher-public \
            trial-voucher-admin \
            create-trial-voucher-checkout \
            create-flight-payment-checkout \
            create-member-topup-checkout \
            member-card-setup \
            charge-flight-saved-card \
            stripe-connect \
            send-trial-voucher-email \
            trial-voucher-stripe-webhook \
            --project-ref "${SUPABASE_PROJECT_REF}" \
            --no-verify-jwt \
            --use-api
