name: Daily Membership Xero Refresh

on:
  schedule:
    # 15:00 UTC is 01:00 AEST / 02:00 AEDT, before the database lifecycle job.
    - cron: "0 15 * * *"
  workflow_dispatch:

concurrency:
  group: daily-membership-xero-refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh membership invoice payments
    runs-on: ubuntu-latest
    steps:
      - name: Issue renewals and refresh membership invoices in Xero
        env:
          ENABLE_XERO_SYNC_WORKER: ${{ vars.ENABLE_XERO_SYNC_WORKER }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ] && [ "${ENABLE_XERO_SYNC_WORKER:-false}" != "true" ]; then
            echo "Membership Xero refresh is disabled. Set ENABLE_XERO_SYNC_WORKER=true to enable it."
            exit 0
          fi

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "::error::SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY secrets are required."
            exit 1
          fi

          issue_response_file="$(mktemp)"
          issue_http_code="$(
            curl --silent --show-error \
              --request POST \
              --header "Content-Type: application/json" \
              --header "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              --data '{"action":"issue-membership-renewals","sendEmail":true}' \
              --output "$issue_response_file" \
              --write-out "%{http_code}" \
              "${SUPABASE_URL%/}/functions/v1/xero-sync"
          )"

          cat "$issue_response_file"
          echo
          if [ "$issue_http_code" -lt 200 ] || [ "$issue_http_code" -ge 300 ]; then
            echo "::error::Membership invoice issue failed with HTTP ${issue_http_code}."
            exit 1
          fi

          issue_failed="$(jq '.failed // 0' "$issue_response_file")"
          if [ "$issue_failed" -gt 0 ]; then
            echo "::error::${issue_failed} membership invoice issue(s) failed. Review Xero item settings and member contact details."
            exit 1
          fi

          refresh_response_file="$(mktemp)"
          refresh_http_code="$(
            curl --silent --show-error \
              --request POST \
              --header "Content-Type: application/json" \
              --header "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              --data '{"action":"refresh-membership-invoices"}' \
              --output "$refresh_response_file" \
              --write-out "%{http_code}" \
              "${SUPABASE_URL%/}/functions/v1/xero-sync"
          )"

          cat "$refresh_response_file"
          echo
          if [ "$refresh_http_code" -lt 200 ] || [ "$refresh_http_code" -ge 300 ]; then
            echo "::error::Membership Xero refresh failed with HTTP ${refresh_http_code}."
            exit 1
          fi

          refresh_failed="$(jq '[.results[]? | select(.error)] | length' "$refresh_response_file")"
          if [ "$refresh_failed" -gt 0 ]; then
            echo "::error::${refresh_failed} membership invoice refresh(es) failed. The lifecycle stale-data guard will defer any affected cessation."
            exit 1
          fi
