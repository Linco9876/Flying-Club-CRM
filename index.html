<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://joarmzswpufrduectjse.supabase.co" crossorigin />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bendigo Flying Club Members Flight Management System</title>
    <script>
      (function () {
        try {
          var currentUserId = '';
          for (var i = 0; i < localStorage.length; i += 1) {
            var key = localStorage.key(i);
            if (!key || key.indexOf('sb-') !== 0 || key.indexOf('-auth-token') === -1) continue;
            try {
              var sessionValue = JSON.parse(localStorage.getItem(key) || '{}');
              currentUserId =
                (sessionValue.user && sessionValue.user.id) ||
                (sessionValue.currentSession && sessionValue.currentSession.user && sessionValue.currentSession.user.id) ||
                '';
              if (currentUserId) break;
            } catch (error) {}
          }

          var userThemeKey = currentUserId ? 'bfc.portal.theme.user.' + currentUserId : '';
          var theme = (userThemeKey && localStorage.getItem(userThemeKey)) || 'auto';
          if (!/^(light|semi-dark|dark|day-night|auto)$/.test(theme)) theme = 'auto';
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDaylightThemeTime = function (date) {
            var latitude = -36.757;
            var longitude = 144.2794;
            var radians = function (degrees) { return degrees * Math.PI / 180; };
            var degrees = function (radiansValue) { return radiansValue * 180 / Math.PI; };
            var start = new Date(date.getFullYear(), 0, 0);
            var dayOfYear = Math.floor((date.getTime() - start.getTime() + ((start.getTimezoneOffset() - date.getTimezoneOffset()) * 60000)) / 86400000);
            var sunTime = function (isSunrise) {
              var longitudeHour = longitude / 15;
              var approximateTime = dayOfYear + ((isSunrise ? 6 : 18) - longitudeHour) / 24;
              var meanAnomaly = (0.9856 * approximateTime) - 3.289;
              var trueLongitude = meanAnomaly + (1.916 * Math.sin(radians(meanAnomaly))) + (0.020 * Math.sin(radians(2 * meanAnomaly))) + 282.634;
              trueLongitude = (trueLongitude + 360) % 360;
              var rightAscension = degrees(Math.atan(0.91764 * Math.tan(radians(trueLongitude))));
              rightAscension = (rightAscension + 360) % 360;
              rightAscension += (Math.floor(trueLongitude / 90) * 90) - (Math.floor(rightAscension / 90) * 90);
              rightAscension /= 15;
              var sinDeclination = 0.39782 * Math.sin(radians(trueLongitude));
              var cosDeclination = Math.cos(Math.asin(sinDeclination));
              var cosHourAngle = (Math.cos(radians(90.833)) - (sinDeclination * Math.sin(radians(latitude)))) / (cosDeclination * Math.cos(radians(latitude)));
              if (cosHourAngle > 1 || cosHourAngle < -1) return null;
              var hourAngle = isSunrise ? 360 - degrees(Math.acos(cosHourAngle)) : degrees(Math.acos(cosHourAngle));
              var localMeanTime = (hourAngle / 15) + rightAscension - (0.06571 * approximateTime) - 6.622;
              var utcHour = (localMeanTime - longitudeHour + 24) % 24;
              var localMidnight = new Date(date.getFullYear(), date.getMonth(), date.getDate(), 0, 0, 0, 0);
              var result = new Date(localMidnight);
              result.setUTCHours(Math.floor(utcHour), Math.round((utcHour % 1) * 60), 0, 0);
              if (result < localMidnight) {
                result.setUTCDate(result.getUTCDate() + 1);
              }
              return result;
            };
            var sunrise = sunTime(true);
            var sunset = sunTime(false);
            if (!sunrise || !sunset) {
              var hour = date.getHours();
              return hour >= 6 && hour < 18;
            }
            return date >= sunrise && date < sunset;
          };
          var useDark = theme === 'dark' || theme === 'semi-dark' || (theme === 'day-night' && !isDaylightThemeTime(new Date())) || (theme === 'auto' && prefersDark);
          document.documentElement.dataset.portalTheme = useDark ? 'dark' : 'light';
          if (theme === 'semi-dark') {
            document.documentElement.dataset.portalVariant = 'semi-dark';
          }
        } catch (error) {
          document.documentElement.dataset.portalTheme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
